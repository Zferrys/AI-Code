# 共享内存区：IP 限流（10MB ≈ 8万个IP状态）
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=public_limit:10m rate=60r/m;

# 爬虫 User-Agent 黑名单 map
map $http_user_agent $bad_bot {
    default 0;
    ~*(curl|wget|python-requests|python-urllib|Go-http-client|scrapy|HttpClient|okhttp|java/) 1;
    ~*(MJ12bot|Semrushbot|AhrefsBot|DotBot|BLEXBot|DataForSeoBot) 1;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # 全局：拦截已知爬虫 UA
    if ($bad_bot) {
        return 403;
    }

    # API 反向代理到后端
    location /api/ {
        # IP 限流：所有 API 路径 30次/分钟
        limit_req zone=api_limit burst=10 nodelay;
        limit_req_status 429;

        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 180s;
    }

    # 上传文件
    location /uploads/ {
        proxy_pass http://backend:8080/uploads/;
        proxy_set_header Host $host;
    }

    # xingxing 静态页面
    location /xingxing/ {
        alias /usr/share/nginx/xingxing/;
        index index.html;
    }

    # 前端静态文件
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 429 响应页
    error_page 429 /429.html;
    location = /429.html {
        internal;
        default_type text/html;
        return 200 '<!DOCTYPE html><html><head><meta charset="utf-8"><title>请求频率过高</title></head><body style="text-align:center;padding:80px;font-family:sans-serif"><h1>⏳ 请求过于频繁</h1><p>请稍后再试</p></body></html>';
    }
}
