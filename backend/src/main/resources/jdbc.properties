# MySQL 5.7 数据库连接配置
# 数据库：aicode_db
jdbc.driver=com.mysql.jdbc.Driver
jdbc.url=jdbc:mysql://${MYSQL_HOST:127.0.0.1}:3306/aicode_db?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
jdbc.username=root
# ⚠️ 密码必须通过以下任一方式配置（不提交到版本控制）：
#    方式1 — JVM 系统属性：java -Djdbc.password=你的密码
#    方式2 — 环境变量：   set JDBC_PASSWORD=你的密码
#    方式3 — IDE 启动配置：VM options 添加 -Djdbc.password=你的密码
# ⚠️ 无默认值，启动时必须通过环境变量或 -D 参数设置
jdbc.password=${JDBC_PASSWORD}

# Druid 连接池配置
jdbc.initialSize=5
jdbc.minIdle=5
jdbc.maxActive=20
jdbc.maxWait=60000
jdbc.timeBetweenEvictionRunsMillis=60000
jdbc.minEvictableIdleTimeMillis=300000
jdbc.validationQuery=SELECT 1
jdbc.testWhileIdle=true
jdbc.testOnBorrow=false
jdbc.testOnReturn=false
jdbc.poolPreparedStatements=true
jdbc.maxPoolPreparedStatementPerConnectionSize=20
